<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolPro Manager Uganda</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--primary:#1a472a;--primary-light:#2d6a4f;--accent:#f4a261;--accent2:#e76f51;--bg:#f8f9f4;--card:#ffffff;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--success:#22c55e;--danger:#ef4444;--shadow:0 4px 24px rgba(26,71,42,0.10);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:white;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
.screen{display:none;}.screen.active{display:block;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#1a472a 0%,#2d6a4f 50%,#f4a261 100%);padding:24px;}
.login-card{background:white;border-radius:20px;padding:40px 32px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .icon{width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px;}
.login-logo h2{font-size:1.5rem;font-weight:800;color:var(--primary);}
.tab-switch{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:24px;}
.tab-switch button{flex:1;padding:10px;border:none;background:none;border-radius:8px;font-family:'Outfit',sans-serif;font-weight:600;font-size:0.9rem;cursor:pointer;color:var(--muted);transition:all 0.2s;}
.tab-switch button.active{background:white;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-weight:600;font-size:0.85rem;margin-bottom:6px;}
.form-group input,.form-group select{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-family:'Outfit',sans-serif;font-size:0.95rem;background:white;}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary);}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;margin-top:8px;}
.error-msg{color:var(--danger);font-size:0.85rem;margin-top:8px;text-align:center;}
.dash-wrap{padding:20px;max-width:900px;margin:0 auto;}
.info-bar{background:white;border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow);border-left:4px solid var(--primary);}
.info-bar .info-item{font-size:0.85rem;}.info-bar .info-item span{font-weight:700;color:var(--primary);}
.marks-table-wrap{background:white;border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;}
.marks-table-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;padding:14px 20px;font-weight:700;font-size:0.95rem;display:flex;justify-content:space-between;align-items:center;}
table{width:100%;border-collapse:collapse;}
th{background:#f0fdf4;padding:10px 12px;text-align:left;font-size:0.8rem;font-weight:700;color:var(--primary);border-bottom:2px solid var(--border);}
td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:0.88rem;}
.mark-input{width:70px;padding:6px 8px;border:2px solid var(--border);border-radius:6px;font-family:'Outfit',sans-serif;font-size:0.88rem;text-align:center;}
.mark-input:focus{outline:none;border-color:var(--primary);}
.grade-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.8rem;font-weight:700;}
.grade-D1,.grade-D2{background:#dcfce7;color:#15803d;}
.grade-C3,.grade-C4{background:#d1fae5;color:#047857;}
.grade-C5,.grade-C6{background:#fef9c3;color:#854d0e;}
.grade-P7,.grade-P8{background:#ffedd5;color:#9a3412;}
.grade-F9{background:#fee2e2;color:#991b1b;}
.grade-A,.grade-B{background:#dcfce7;color:#15803d;}
.grade-C{background:#fef9c3;color:#854d0e;}
.grade-D,.grade-E{background:#ffedd5;color:#9a3412;}
.grade-F,.grade-O{background:#fee2e2;color:#991b1b;}
.btn-submit{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;border:none;padding:14px 32px;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;width:100%;}
.success-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--primary);color:white;padding:14px 28px;border-radius:12px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.2);transition:transform 0.4s;z-index:9999;}
.success-toast.show{transform:translateX(-50%) translateY(0);}
.admin-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.admin-tab{padding:8px 18px;border:2px solid var(--primary);border-radius:8px;background:white;color:var(--primary);font-family:'Outfit',sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;}
.admin-tab.active,.admin-tab:hover{background:var(--primary);color:white;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-bottom:20px;}
.stat-card{background:white;border-radius:12px;padding:16px;box-shadow:var(--shadow);text-align:center;}
.stat-card .num{font-size:2rem;font-weight:800;color:var(--primary);line-height:1;}
.stat-card .lbl{font-size:0.75rem;color:var(--muted);margin-top:4px;}
.class-btn{padding:7px 16px;border:2px solid var(--border);border-radius:8px;background:white;font-family:'Outfit',sans-serif;font-weight:600;font-size:0.82rem;cursor:pointer;}
.class-btn.active{border-color:var(--primary);background:var(--primary);color:white;}
.no-data{text-align:center;padding:40px;color:var(--muted);}
.scroll-x{overflow-x:auto;}
.badge{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;}
.btn-logout{background:#e76f51;color:white;border:none;padding:6px 14px;border-radius:8px;font-family:'Outfit',sans-serif;font-weight:600;font-size:0.8rem;cursor:pointer;}
.config-inputs{display:grid;gap:12px;margin:16px 0;}
.config-inputs input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:0.82rem;}
.btn-save-config{background:var(--accent);color:white;border:none;padding:12px 24px;border-radius:8px;font-family:'Outfit',sans-serif;font-weight:700;cursor:pointer;font-size:0.95rem;width:100%;}
.step{display:flex;align-items:flex-start;margin-bottom:14px;}
.step-num{display:inline-flex;width:28px;height:28px;background:var(--primary);color:white;border-radius:50%;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;margin-right:8px;flex-shrink:0;}
</style>
</head>
<body>
